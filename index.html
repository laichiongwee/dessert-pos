<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍅 柿柿润糖水 - POS System</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --persimmon: #E8784A; --persimmon-light: #FDE8DF; --persimmon-dark: #C45A2E;
            --cream: #FFF8F3; --white: #FFFFFF; --text: #3D2020; --text-light: #6B4E4E;
            --text-lighter: #9B7E7E; --border: #F0E0D6; --shadow: 0 2px 16px rgba(232, 120, 74, 0.08);
            --shadow-lg: 0 8px 32px rgba(232, 120, 74, 0.12); --radius: 16px; --radius-sm: 10px;
            --radius-xs: 8px; --green: #4CAF84; --green-light: #E8F6EF; --red: #E85555;
            --red-light: #FDE8E8; --gold: #F0A855; --gold-light: #FFF6EB;
            --bottom-nav-height: 64px; --header-height: 56px; --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #FFF5EF; color: var(--text); min-height: 100vh; min-height: 100dvh;
            -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased;
            user-select: none; -webkit-user-select: none; overflow-x: hidden;
        }
        /* HEADER */
        .header {
            position: sticky; top: 0; z-index: 100; background: var(--white);
            padding: 10px 16px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); box-shadow: 0 1px 8px rgba(0,0,0,0.04);
            height: var(--header-height); gap: 10px;
        }
        .header-brand { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 1.1rem; color: var(--persimmon); }
        .btn {
            padding: 9px 16px; border-radius: 24px; border: none; cursor: pointer; font-weight: 700;
            font-size: 0.85rem; font-family: inherit; transition: var(--transition); white-space: nowrap;
            display: inline-flex; align-items: center; gap: 5px; touch-action: manipulation;
        }
        .btn:active { transform: scale(0.95); transition: 0.1s; }
        .btn-primary { background: var(--persimmon); color: white; box-shadow: 0 2px 8px rgba(232,120,74,0.3); }
        .btn-outline { background: var(--white); color: var(--persimmon); border: 2px solid var(--persimmon); }
        .btn-sm { padding: 6px 12px; font-size: 0.78rem; border-radius: 18px; }
        .btn-xs { padding: 4px 10px; font-size: 0.7rem; border-radius: 14px; font-weight: 600; }
        .mode-switch { display: flex; background: #F5E8E0; border-radius: 24px; padding: 3px; gap: 2px; }
        .mode-switch button {
            padding: 7px 14px; border-radius: 22px; border: none; cursor: pointer; font-weight: 700;
            font-size: 0.78rem; font-family: inherit; transition: var(--transition); background: transparent;
            color: var(--text-light);
        }
        .mode-switch button.active { background: var(--white); color: var(--persimmon); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .main-container { max-width: 900px; margin: 0 auto; padding: 12px 12px 100px; display: none; }
        .main-container.active { display: block; animation: fadeSlideIn 0.35s ease; }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .cashier-layout { display: flex; gap: 12px; flex-wrap: wrap; }
        .menu-panel { flex: 1 1 320px; min-width: 280px; }
        .order-panel {
            flex: 0 0 340px; background: var(--white); border-radius: var(--radius);
            box-shadow: var(--shadow-lg); padding: 16px; position: sticky; top: 72px;
            align-self: flex-start; max-height: calc(100vh - 100px); overflow-y: auto;
            display: flex; flex-direction: column;
        }
        @media (max-width: 768px) {
            .cashier-layout { flex-direction: column; }
            .order-panel { flex: 0 0 auto; position: static; max-height: none; order: -1; margin-bottom: 8px; }
        }
        .category-tabs { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 12px; scrollbar-width: none; }
        .category-tabs::-webkit-scrollbar { display: none; }
        .cat-tab {
            padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--border); cursor: pointer;
            font-weight: 600; font-size: 0.8rem; white-space: nowrap; transition: var(--transition);
            background: var(--white); color: var(--text-light); flex-shrink: 0; font-family: inherit;
        }
        .cat-tab.active { background: var(--persimmon); color: white; border-color: var(--persimmon); }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .menu-card {
            background: var(--white); border-radius: var(--radius-sm); padding: 10px; cursor: pointer;
            transition: var(--transition); border: 2px solid transparent; box-shadow: var(--shadow);
            text-align: center; position: relative; overflow: hidden; touch-action: manipulation;
        }
        .menu-card:active { transform: scale(0.96); border-color: var(--persimmon); }
        .menu-card .item-emoji { font-size: 2.5rem; display: block; margin-bottom: 4px; }
        .menu-card .item-name { font-weight: 700; font-size: 0.82rem; color: var(--text); line-height: 1.2; margin-bottom: 2px; }
        .menu-card .item-price { font-weight: 800; font-size: 0.95rem; color: var(--persimmon); }
        .member-section { background: var(--gold-light); border-radius: var(--radius-xs); padding: 10px 12px; margin: 8px 0; font-size: 0.78rem; border: 1px solid #F5E0C0; }
        .member-search { position: relative; display: flex; gap: 6px; align-items: center; }
        .member-search input { flex: 1; padding: 8px 12px; border-radius: 20px; border: 1.5px solid var(--border); font-family: inherit; font-size: 0.8rem; background: var(--white); }
        .member-search input:focus { outline: none; border-color: var(--persimmon); }
        .member-dropdown {
            position: absolute; top: 100%; left: 0; right: 0; background: white;
            border: 1px solid var(--border); border-radius: var(--radius-xs); max-height: 150px;
            overflow-y: auto; z-index: 20; box-shadow: var(--shadow-lg); display: none;
        }
        .member-dropdown-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #FBF0E8; font-size: 0.8rem; }
        .member-dropdown-item:hover { background: var(--persimmon-light); }
        .order-items { flex: 1; overflow-y: auto; max-height: 280px; margin-bottom: 8px; }
        .order-item-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #FBF0E8; font-size: 0.8rem; }
        .order-item-row .oi-name { flex: 1; font-weight: 600; font-size: 0.78rem; }
        .order-item-row .oi-qty { display: flex; align-items: center; gap: 4px; }
        .order-item-row .oi-qty button { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--white); cursor: pointer; font-weight: 700; }
        .order-summary { border-top: 2px solid #F0D8C8; padding-top: 10px; font-weight: 700; font-size: 0.9rem; }
        .order-summary .total-row { display: flex; justify-content: space-between; font-size: 1.1rem; font-weight: 800; color: var(--persimmon); margin: 4px 0; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: flex-end; justify-content: center; animation: fadeIn 0.2s ease; }
        .modal-sheet { background: var(--white); border-radius: 20px 20px 0 0; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; padding: 20px 16px 28px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-handle { width: 40px; height: 4px; background: #D0C0B8; border-radius: 2px; margin: 0 auto 12px; }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #3D2020; color: white; padding: 10px 20px; border-radius: 24px;
            font-weight: 600; font-size: 0.85rem; z-index: 300; animation: toastIn 0.3s ease;
            pointer-events: none; white-space: nowrap;
        }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .payment-detail-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
        .payment-detail-row label { font-size: 0.8rem; white-space: nowrap; }
        .payment-detail-row input, .payment-detail-row select { flex: 1; padding: 8px 10px; border-radius: 16px; border: 1.5px solid var(--border); font-family: inherit; font-size: 0.8rem; }
        .discount-rule-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
        .discount-rule-row input { width: 70px; padding: 6px; border-radius: 12px; border: 1.5px solid var(--border); font-family: inherit; font-size: 0.7rem; }
        .daily-report-table { width: 100%; font-size: 0.75rem; border-collapse: collapse; }
        .daily-report-table td, .daily-report-table th { padding: 6px 4px; border-bottom: 1px solid #F0D8C8; text-align: left; }
		/* ---------- FULFILLMENT QUEUE ---------- */
.fulfillment-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
}
@media (max-width: 600px) {
    .fulfillment-layout { grid-template-columns: 1fr; }
}
.order-queue, .order-history {
    background: var(--white);
    border-radius: var(--radius);
    padding: 12px;
    box-shadow: var(--shadow);
}
.order-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px;
    margin-bottom: 8px;
    font-size: 0.8rem;
    transition: var(--transition);
}
.order-card.ready { border-left: 4px solid var(--green); }
.order-card.completed { background: #F8F8F8; opacity: 0.8; }
.order-card .flex-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px; }
.call-number { font-weight: 800; font-size: 1.2rem; color: var(--persimmon); }
.status-badge { padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
.status-pending { background: #FFF3E0; color: #E65100; }
.status-preparing { background: #E3F2FD; color: #1565C0; }
.status-ready { background: var(--green-light); color: var(--green); }
.status-completed { background: #F3E5F5; color: #7B1FA2; }
/* ---------- ADMIN UNLOCK ---------- */
.admin-bar {
    background: var(--gold-light);
    padding: 6px 12px;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    gap: 10px;
    border-radius: 8px;
    margin-bottom: 8px;
}
.editable-field { border: 1px dashed var(--persimmon); padding: 2px 4px; border-radius: 4px; }
.editable-field:hover { background: #FFF0E0; }
/* inline edit in menu cards */
.menu-card .edit-icon {
    position: absolute; top: 4px; left: 4px;
    background: rgba(255,255,255,0.8); border-radius: 50%; padding: 2px;
    font-size: 0.6rem; cursor: pointer; display: none;
}
.menu-card.admin-mode .edit-icon { display: block; }
.member-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    max-height: 150px;
    overflow-y: auto;
    z-index: 50;               /* ensure it's above other elements */
    box-shadow: var(--shadow-lg);
    display: none;
    list-style: none;
    padding: 0;
    margin-top: 4px;
}
.member-dropdown-item {
    padding: 10px 12px;
    cursor: pointer;
    border-bottom: 1px solid #FBF0E8;
    font-size: 0.8rem;
}
.member-dropdown-item:active {
    background: var(--persimmon-light);
}

#menuEditModal.modal-overlay {
  z-index: 999 !important;
}
#menuEditModal .modal-sheet {
  z-index: 1000 !important;
}
    </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="header-brand"><span>🍅</span><span>柿柿润糖水</span></div>
    <div class="header-actions">
        <div class="mode-switch" id="modeSwitcher">
		
    <button data-mode="cashier" class="active" onclick="switchMode('cashier')">💰 收银</button>
    <button data-mode="customer" onclick="switchMode('customer')">📱 顾客</button>
    <button data-mode="fulfillment" onclick="switchMode('fulfillment')">📦 出餐</button>
</div>
        <button class="btn btn-outline btn-sm" onclick="openUnpaidOrdersModal()">💰 待收款</button>
		<button class="btn btn-outline btn-sm" onclick="openQRModal()">🔗 QR</button>
        <button class="btn btn-ghost btn-sm" onclick="openReportModal()">📊 报表</button>
        <button class="btn btn-ghost btn-sm" onclick="openSettings()">⚙️</button>
    </div>
	
	<div class="admin-bar" id="adminBar" style="display:none;">
        <span>🔓 管理模式</span>
        <input type="file" id="logoUpload" accept="image/*" style="display:none;" onchange="uploadLogo()">
        <button class="btn btn-xs btn-outline" onclick="document.getElementById('logoUpload').click()">更换Logo</button>
        <button class="btn btn-xs btn-outline" onclick="editStoreName()">改店名</button>
        <button class="btn btn-xs btn-outline" onclick="openDiscountRulesModal()">🏷️ 优惠规则</button>
        <button class="btn btn-xs btn-outline" onclick="openCategoryModal()">📂 管理分类</button>
        <button class="btn btn-xs btn-outline" onclick="openMenuEditModal()">＋菜品</button>
		<button class="btn btn-xs btn-outline" onclick="openMenuSheetModal()">📝 更新菜单</button>
        <button class="btn btn-xs btn-danger" onclick="toggleAdminMode()">🔒 锁定编辑</button>
    </div>
    <button class="btn btn-sm" onclick="toggleAdminMode()" id="unlockBtn" style="margin-bottom:8px;">🔓 解锁管理</button>
    <div class="menu-grid" id="adminMenuGrid" style="display:none;"></div>
</header>

<!-- CASHIER VIEW -->
<div class="main-container active" id="cashierView">
    <div class="cashier-layout">
        <div class="menu-panel">
            <div class="category-tabs" id="categoryTabs"></div>
            <div class="menu-grid" id="menuGrid"></div>
        </div>
        <div class="order-panel" id="orderPanel">
            <h3>🧾 当前订单</h3>
            <div class="order-items" id="orderItems"><div class="order-empty"><span class="icon">🛒</span>点击菜单添加商品</div></div>
            <div class="member-section" id="memberSection">
                <div class="member-search" style="position:relative;">
                    <input type="tel" id="memberPhoneInput" placeholder="📞 会员手机号查找..." oninput="searchMemberSuggestions()" autocomplete="off">
                    <div class="member-dropdown" id="memberDropdown"></div>
                    <button class="btn btn-xs btn-outline" onclick="clearMember()">清除</button>
                    <button class="btn btn-xs btn-primary" onclick="openAddMemberModal()">＋ 添加</button>
                </div>
                <div id="memberInfoDisplay" style="margin-top:6px;font-size:0.75rem;color:var(--text-light);"></div>
            </div>
            <div class="order-summary">
                <div style="display:flex;justify-content:space-between;"><span>小计</span><span id="subtotalDisplay">RM 0.00</span></div>
                <div style="display:flex;justify-content:space-between;color:var(--green);" id="discountRow" hidden><span>会员折扣</span><span id="discountDisplay">-RM 0.00</span></div>
                <div class="total-row"><span>总计</span><span id="totalDisplay">RM 0.00</span></div>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
                <button class="btn btn-outline btn-sm" onclick="clearOrder()" style="flex:1;">🗑️ 清空</button>
                <button class="btn btn-primary btn-sm" onclick="openPaymentModal()" style="flex:2;">💳 结算</button>
            </div>
        </div>
    </div>
</div>

<!-- CUSTOMER VIEW (unchanged mostly) -->
<div class="main-container" id="customerView">
    <div class="customer-hero"><h1>🍅 柿柿润糖水</h1><p>扫码点餐 · 美味直达</p></div>
    <div class="category-tabs" id="customerCategoryTabs"></div>
    <div class="menu-grid" id="customerMenuGrid"></div>
    <button class="customer-cart-fab" id="customerCartFab" onclick="openCustomerCart()">🛒 查看购物车 <span class="badge" id="cartCountBadge">0</span></button>
</div>

<!-- FULFILLMENT VIEW -->
<div class="main-container" id="fulfillmentView">
    <div class="menu-grid" id="adminMenuGrid" style="margin-bottom:16px;"></div>

	<div class="fulfillment-layout">
        <div class="order-queue">
            <h3 style="margin-bottom:8px;">⏳ 制作中</h3>
            <div id="activeOrders"></div>
        </div>
        <div class="order-history">
            <h3 style="margin-bottom:8px;">✅ 已取餐</h3>
            <div id="completedOrders"></div>
        </div>
    </div>
</div>

<!-- ================= MODALS ================= -->
<!-- QR Modal -->
<div class="modal-overlay" id="qrModal" style="display:none;" onclick="closeQRModal(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()"><div class="modal-handle"></div>
        <h3>📱 顾客扫码点餐</h3><div id="qrcode"></div><p class="qr-url" id="qrUrlDisplay"></p>
    </div>
</div>

<!-- Customer Cart Modal -->
<div class="modal-overlay" id="customerCartModal" style="display:none;" onclick="closeCustomerCartModal(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()"><div class="modal-handle"></div>
        <h3>🛒 我的购物车</h3><div id="customerCartItems"></div>
        <div style="border-top:2px solid #F0D8C8;padding-top:10px;margin-top:8px;">
            <div style="display:flex;justify-content:space-between;font-weight:800;"><span>总计</span><span id="customerCartTotal">RM 0.00</span></div>
            <input type="text" id="customerNameInput" placeholder="👤 您的姓名" style="width:100%;padding:10px;border-radius:20px;border:1.5px solid var(--border);margin-top:8px;font-family:inherit;">
            <input type="tel" id="customerPhoneInput" placeholder="📞 手机号" style="width:100%;padding:10px;border-radius:20px;border:1.5px solid var(--border);margin-top:6px;font-family:inherit;">
            <button class="btn btn-primary" style="width:100%;margin-top:10px;justify-content:center;" onclick="submitCustomerOrder()">✅ 提交订单</button>
            <button class="btn btn-outline btn-sm" style="width:100%;margin-top:6px;" onclick="closeCustomerCartModal()">继续点餐</button>
        </div>
    </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal" style="display:none;" onclick="closeSettingsModal(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()"><div class="modal-handle"></div>
        <h3>⚙️ 系统设置</h3>
        <input type="url" id="gasUrlInput" placeholder="Google Apps Script URL" style="width:100%;padding:8px;border-radius:16px;border:1.5px solid var(--border);font-family:inherit;">
        <button class="btn btn-primary btn-sm" onclick="saveSettings()" style="margin-top:8px;">💾 保存设置</button>
        <button class="btn btn-outline btn-sm" onclick="loadDemoData()">📦 加载演示数据</button>
    </div>
</div>

<!-- Add Member Modal -->
<div class="modal-overlay" id="addMemberModal" style="display:none;" onclick="closeAddMemberModal(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()"><div class="modal-handle"></div>
        <h3>🧑‍🤝‍🧑 添加会员</h3>
        <input type="text" id="newMemberName" placeholder="姓名" style="width:100%;padding:10px;border-radius:20px;border:1.5px solid var(--border);margin-bottom:8px;font-family:inherit;">
        <input type="tel" id="newMemberPhone" placeholder="手机号" style="width:100%;padding:10px;border-radius:20px;border:1.5px solid var(--border);margin-bottom:12px;font-family:inherit;">
        <button class="btn btn-primary" style="width:100%;" onclick="submitNewMember()">💾 保存</button>
        <button class="btn btn-outline btn-sm" style="width:100%;margin-top:6px;" onclick="closeAddMemberModal()">取消</button>
    </div>
</div>

<!-- NEW: Payment Modal -->
<div class="modal-overlay" id="paymentModal" style="display:none;" onclick="closePaymentModal(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()"><div class="modal-handle"></div>
        <h3>💳 结算</h3>
        <div id="paymentMethodSelector" style="margin-bottom:12px;">
            <label style="font-weight:700;">支付方式：</label>
            <select id="paymentMethodSelect" onchange="showPaymentDetails()" style="width:100%;padding:10px;border-radius:16px;border:1.5px solid var(--border);font-family:inherit;">
                <option value="cash">💰 现金</option>
                <option value="card">💳 信用卡 / 借记卡</option>
                <option value="online">📱 线上支付</option>
            </select>
        </div>
        <!-- Cash details -->
        <div id="cashDetails" style="display:block;">
            <div class="payment-detail-row"><label>应收：</label><span id="payTotalDisplay" style="font-weight:800;"></span></div>
            <div class="payment-detail-row"><label>实收：</label><input type="number" id="cashReceived" placeholder="0.00" step="0.01" oninput="calculateChange()"></div>
            <div class="payment-detail-row"><label>找零：</label><span id="changeDisplay" style="font-weight:800;">RM 0.00</span></div>
        </div>
        <!-- Card details -->
        <div id="cardDetails" style="display:none;">
            <div class="payment-detail-row"><label>卡类型：</label><select id="cardType"><option>Visa</option><option>Mastercard</option><option>Amex</option></select></div>
            <div class="payment-detail-row"><label>卡号末四位：</label><input type="text" id="cardLast4" placeholder="1234" maxlength="4"></div>
            <div class="payment-detail-row"><label>参考号：</label><input type="text" id="cardRefNum" placeholder="可选"></div>
        </div>
        <!-- Online details -->
        <div id="onlineDetails" style="display:none;">
            <div class="payment-detail-row"><label>平台：</label><select id="onlineType"><option>Touch 'n Go</option><option>GrabPay</option><option>Boost</option><option>支付宝</option><option>微信支付</option><option>其他</option></select></div>
            <div class="payment-detail-row"><label>交易参考号：</label><input type="text" id="onlineRefNum" placeholder="输入参考号"></div>
        </div>

// ==================== GLOBAL STATE ====================
const APP_STATE = {

    orders: [], discountRules: [],
    settings: {},
    gasUrl: localStorage.getItem('gasUrl') || '',
    orderIdCounter: parseInt(localStorage.getItem('orderIdCounter') || '1000'),
    adminUnlocked: false,
};

function getDemoMenu() { /* unchanged */ return [

function getDemoMembers() { return [
    { id: 'M001', name: '小明', phone: '0123456789', points: 120, totalSpent: 240.00 },
    { id: 'M002', name: '阿花', phone: '0178369622', points: 85, totalSpent: 170.00 },
];}
function getDemoDiscountRules() { return []; }

// ==================== INIT ====================
async function init() {
    if (!APP_STATE.gasUrl) {
        loadDemoData();
		APP_STATE.settings = { storeName: '柿柿润糖水', logoUrl: '', callNumberCounter: 0 };
    } else {
        try { await fetchFromGoogleSheets(); } catch(e) { loadDemoData(); }
    }
    renderAll();
    updateQRCode();
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.member-search')) {
    const dropdown = document.getElementById('memberDropdown');
    if (dropdown) dropdown.style.display = 'none';
  }
});

function loadDemoData() {
    APP_STATE.menu = getDemoMenu();
    APP_STATE.members = getDemoMembers();
    APP_STATE.discountRules = getDemoDiscountRules();
    APP_STATE.categories = ['全部', ...new Set(APP_STATE.menu.map(i=>i.category))];
}

async function fetchFromGoogleSheets() {
    const url = APP_STATE.gasUrl + '?action=getAll';
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP '+resp.status);
    const data = await resp.json();
    if (data.menu) APP_STATE.menu = data.menu.map(item=>({...item, price:Number(item.price), available:item.available==='TRUE'||item.available===true}));
	if (data.settings) APP_STATE.settings = data.settings;
    if (data.members) APP_STATE.members = data.members.map(m=>({...m, points:Number(m.points), totalSpent:Number(m.totalSpent)}));
    if (data.orders) { APP_STATE.orders = data.orders; const ids = data.orders.map(o=>parseInt(o.id)||0); if(ids.length) APP_STATE.orderIdCounter = Math.max(...ids); }
    if (data.discountRules) APP_STATE.discountRules = data.discountRules;
    APP_STATE.categories = ['全部', ...new Set(APP_STATE.menu.map(i=>i.category))];
    renderAll();
}

async function syncToGoogleSheets(action, payload) {
    if (!APP_STATE.gasUrl) return null;
    const params = new URLSearchParams(); params.append('action', action); params.append('data', JSON.stringify(payload));
    const url = APP_STATE.gasUrl + '?' + params.toString();
    const resp = await fetch(url);
    return await resp.json();
}

// ==================== RENDER ====================
function renderAll() {
    renderCategoryTabs();
    renderMenuGrid();
    renderOrderPanel();
    if (APP_STATE.mode === 'customer') {
        renderCustomerCategoryTabs();
        renderCustomerMenuGrid();
        updateCartBadge();
    }
}
function renderCategoryTabs() { document.getElementById('categoryTabs').innerHTML = APP_STATE.categories.map(cat=>`<button class="cat-tab${cat===APP_STATE.activeCategory?' active':''}" onclick="setCategory('${cat}')">${cat}</button>`).join(''); }
function setCategory(cat) { APP_STATE.activeCategory = cat; renderAll(); }
function getFilteredMenu() {
  // Only show available items in menu:
  return APP_STATE.activeCategory==='全部'
    ? APP_STATE.menu.filter(i => i.available === true || i.available === 'TRUE')
    : APP_STATE.menu.filter(i => (i.category === APP_STATE.activeCategory)
         && (i.available === true || i.available === 'TRUE'));
}
function renderMenuGrid() { /* unchanged */ }
function renderCustomerMenuGrid() { /* unchanged */ }
function renderOrderPanel() { /* unchanged, but with discount using rules later */ }
function updateOrderTotals() {
    let subtotal = APP_STATE.cashierOrder.reduce((s,e)=>s+e.menuItem.price*e.quantity,0);
    let discount = 0;
    if (APP_STATE.currentMember) {
        const applicableRules = APP_STATE.discountRules.filter(r=>Number(r.minPoints) <= (APP_STATE.currentMember.points||0));
        for (let rule of applicableRules) {
            if (rule.type === 'percentage') discount += subtotal * (Number(rule.value)/100);
            else if (rule.type === 'fixed') discount += Number(rule.value);
        }
        discount = Math.min(discount, subtotal);
    }
    document.getElementById('subtotalDisplay').textContent = `RM ${subtotal.toFixed(2)}`;
    document.getElementById('discountRow').hidden = discount===0;
    document.getElementById('discountDisplay').textContent = `-RM ${discount.toFixed(2)}`;
    document.getElementById('totalDisplay').textContent = `RM ${(subtotal-discount).toFixed(2)}`;
}

// ==================== MEMBER SEARCH WITH DROPDOWN ====================
function searchMemberSuggestions() {
    const phone = document.getElementById('memberPhoneInput').value.trim();
    const dropdown = document.getElementById('memberDropdown');
    if (phone.length < 3) {
        dropdown.style.display = 'none';
        APP_STATE.currentMember = null;
        updateMemberDisplay();
        return;
    }
    const matches = APP_STATE.members.filter(m => String(m.phone).includes(phone));
    if (matches.length === 0) {
        dropdown.style.display = 'none';
        APP_STATE.currentMember = null;
    } else {
        dropdown.innerHTML = matches.map(m => 
            `<div class="member-dropdown-item" 
                onclick="event.stopPropagation(); selectMemberById('${m.id}');"
                onmousedown="event.preventDefault();"
            >${m.name} - ${m.phone}</div>`
        ).join('');
        dropdown.style.display = 'block';
    }
    updateMemberDisplay();
}

// Ensure dropdown doesn't close when clicking an item
document.getElementById('memberDropdown').addEventListener('mousedown', function(e) {
    e.stopPropagation();
});
	
function selectMember(member) {
    APP_STATE.currentMember = member;
    document.getElementById('memberPhoneInput').value = member.phone;
    document.getElementById('memberDropdown').style.display = 'none';
    updateMemberDisplay();
}
function selectMemberById(id) {
    const member = APP_STATE.members.find(m => m.id === id);
    if (member) selectMember(member);
}
function clearMember() {
    APP_STATE.currentMember = null;
    document.getElementById('memberPhoneInput').value = '';
    document.getElementById('memberDropdown').style.display = 'none';
    updateMemberDisplay();
}
function updateMemberDisplay() {
    const display = document.getElementById('memberInfoDisplay');
    if (APP_STATE.currentMember) {
        display.innerHTML = `${APP_STATE.currentMember.name} · 积分:${APP_STATE.currentMember.points} · 消费:RM ${Number(APP_STATE.currentMember.totalSpent).toFixed(2)}`;
    } else display.innerHTML = '';
    updateOrderTotals();

// ==================== ADD MEMBER ====================
function openAddMemberModal() { document.getElementById('addMemberModal').style.display='flex'; }
function closeAddMemberModal(e) { if(e&&e.target!==document.getElementById('addMemberModal'))return; document.getElementById('addMemberModal').style.display='none'; }
document.getElementById('addMemberModal').addEventListener('click', function(e){ if(e.target===this) this.style.display='none'; });
async function submitNewMember() {
    const name = document.getElementById('newMemberName').value.trim();
    const phone = document.getElementById('newMemberPhone').value.trim();
    if(!name||!phone){ showToast('⚠️ 请填写完整'); return; }
    const member = { id:'M'+Date.now().toString().slice(-6), name, phone, points:0, totalSpent:0 };
    APP_STATE.members.push(member);
    await syncToGoogleSheets('addMember', member);
    document.getElementById('addMemberModal').style.display='none';
    document.getElementById('newMemberName').value=''; document.getElementById('newMemberPhone').value='';
    APP_STATE.currentMember = member;
    document.getElementById('memberPhoneInput').value = member.phone;
    updateMemberDisplay();
    showToast('✅ 会员已添加');
}

// ==================== PAYMENT MODAL ====================
APP_STATE.selectedOrderForPayment = null;

function openPaymentModal(orderId) {
    let payOrder = null;
    if (orderId) {
        payOrder = APP_STATE.orders.find(o => o.id === orderId);
        APP_STATE.selectedOrderForPayment = payOrder;
    } else {
        APP_STATE.selectedOrderForPayment = null;
    }
    const total = payOrder ? Number(payOrder.total) : getOrderTotal();
    document.getElementById('payTotalDisplay').textContent = `RM ${total.toFixed(2)}`;
    document.getElementById('paymentModal').style.display='flex';
    document.getElementById('paymentMethodSelect').value='cash';
    showPaymentDetails();
    // Optionally clear previous input
    document.getElementById('cashReceived').value = '';
    document.getElementById('changeDisplay').textContent = 'RM 0.00';
}

function calculateChange() {
    let total;
    if (APP_STATE.selectedOrderForPayment) {
        total = Number(APP_STATE.selectedOrderForPayment.total);
    } else {
        total = getOrderTotal();
    }
    const received = parseFloat(document.getElementById('cashReceived').value) || 0;
    const change = Math.max(0, received - total);
    document.getElementById('changeDisplay').textContent = `RM ${change.toFixed(2)}`;
}

function closePaymentModal(e) { 
    if(e && e.target!==document.getElementById('paymentModal')) return;
    document.getElementById('paymentModal').style.display='none';
    APP_STATE.selectedOrderForPayment = null;
}

// Remember to update finalizePayment or processPayment so it also clears the pointer after processing.

function showPaymentDetails() {
    const method = document.getElementById('paymentMethodSelect').value;
    document.getElementById('cashDetails').style.display = method==='cash'?'block':'none';
    document.getElementById('cardDetails').style.display = method==='card'?'block':'none';
    document.getElementById('onlineDetails').style.display = method==='online'?'block':'none';
    if(method==='cash') calculateChange();
}

function finalizePayment() {
    const method = document.getElementById('paymentMethodSelect').value;
    const total = getOrderTotal();
    let paymentDetails = { method };
    if (method === 'cash') {
        const received = parseFloat(document.getElementById('cashReceived').value) || 0;
        if (received < total) { showToast('⚠️ 实收金额不足'); return; }
        paymentDetails.amountTendered = received;
        paymentDetails.change = received - total;
    } else if (method === 'card') {
        paymentDetails.cardType = document.getElementById('cardType').value;
        paymentDetails.cardLast4 = document.getElementById('cardLast4').value;
        paymentDetails.refNum = document.getElementById('cardRefNum').value;
    } else if (method === 'online') {
        paymentDetails.onlineType = document.getElementById('onlineType').value;
        paymentDetails.refNum = document.getElementById('onlineRefNum').value;
    }
    processPayment(method, total, paymentDetails);
    document.getElementById('paymentModal').style.display = 'none';
}

async function processPayment(method, total, paymentDetails = {}) {
    const orderId = String(++APP_STATE.orderIdCounter);
    localStorage.setItem('orderIdCounter', APP_STATE.orderIdCounter);
    const order = {
    id: orderId,
    date: new Date().toISOString(),
    items: APP_STATE.cashierOrder.map(e => ({ name: e.menuItem.name, qty: e.quantity, price: e.menuItem.price })),
    total: total,
    paymentMethod: method,
    memberPhone: APP_STATE.currentMember?.phone || '',
    memberName: APP_STATE.currentMember?.name || '',
    paymentDetails: paymentDetails,
    discountApplied: getDiscountAmount(),
    status: 'pending',
    callNumber: ''
};
    APP_STATE.orders.push(order);
    if (APP_STATE.currentMember) {
        APP_STATE.currentMember.points += Math.floor(total);
        APP_STATE.currentMember.totalSpent += total;
        await syncToGoogleSheets('addOrder', { order, updatedMember: APP_STATE.currentMember });
    } else {
        await syncToGoogleSheets('addOrder', { order, updatedMember: null });
    }
    APP_STATE.cashierOrder = [];
    APP_STATE.currentMember = null;
    document.getElementById('memberPhoneInput').value = '';
    renderOrderPanel();
    showToast(`✅ 订单 #${orderId} 已完成`);
}
function getOrderTotal() {
    const subtotal = APP_STATE.cashierOrder.reduce((s,e)=>s+e.menuItem.price*e.quantity,0);
    const discount = getDiscountAmount();
    return Math.max(0, subtotal - discount);
}
function getDiscountAmount() {
    if (!APP_STATE.currentMember) return 0;
    let discount = 0;
    const subtotal = APP_STATE.cashierOrder.reduce((s,e)=>s+e.menuItem.price*e.quantity,0);
    for (let rule of APP_STATE.discountRules) {
        if (Number(rule.minPoints) <= (APP_STATE.currentMember.points||0)) {
            if (rule.type === 'percentage') discount += subtotal * (Number(rule.value)/100);
            else if (rule.type === 'fixed') discount += Number(rule.value);
        }
    }
    return Math.min(discount, subtotal);
}

    const today = new Date().toISOString().slice(0,10);

    const report = {
        date: today,

        onlineTotal: todayOrders.filter(o=>o.paymentMethod==='online').reduce((s,o)=>s+Number(o.total),0),
        orderCount: todayOrders.length,
        discountTotal: todayOrders.reduce((s,o)=>s+(Number(o.discountApplied)||0),0),

    };

}

        // ==================== MODE SWITCH ====================
      function switchMode(mode) {
    APP_STATE.mode = mode;
    document.querySelectorAll('#modeSwitcher button').forEach(b => b.classList.remove('active'));
    document.querySelector(`#modeSwitcher button[data-mode="${mode}"]`).classList.add('active');
    document.getElementById('cashierView').classList.toggle('active', mode === 'cashier');
    document.getElementById('customerView').classList.toggle('active', mode === 'customer');
    const fulfillView = document.getElementById('fulfillmentView');

function renderOrderCard(order) {
    const status = order.status || 'pending';
    const callNumber = order.callNumber || '';
    const items = (typeof order.items === 'string' ? JSON.parse(order.items) : order.items) || [];
    
    let statusLabel = { pending_payment: '待付款', pending: '待处理', preparing: '制作中', ready: '可取餐', completed: '已取餐' }[status] || '未知';
    let badgeClass = `status-${status}`;
    if (status === 'pending_payment') badgeClass = 'status-pending'; // use same orangish badge

    let buttons = '';
    if (status === 'pending_payment') {
        buttons = '<span style="color:var(--red);font-size:0.75rem;">⏳ 未付款</span>';
    } else if (status === 'pending') {
        buttons = `<button class="btn btn-xs btn-outline" onclick="updateOrderStatus('${order.id}','preparing')">开始准备</button>`;
    } else if (status === 'preparing') {
        buttons = `<button class="btn btn-xs btn-primary" onclick="markReady('${order.id}')">餐已好</button>`;
    } else if (status === 'ready') {
        buttons = `<button class="btn btn-xs btn-success" onclick="markCompleted('${order.id}')">客人取餐</button>`;
    }

    return `
    <div class="order-card ${status === 'completed' ? 'completed' : ''}">
        <div class="flex-row">
            <span><strong>#${order.id}</strong></span>
            <span class="status-badge ${badgeClass}">${statusLabel}</span>
            ${callNumber ? `<span class="call-number">🔔 ${callNumber}</span>` : ''}
        </div>
        <div style="font-size:0.75rem;">${items.map(i=>`${i.name} x${i.qty}`).join(', ')}</div>
        <div class="flex-row" style="margin-top:4px;">
            <span>RM ${Number(order.total).toFixed(2)}</span>
            <span style="color:var(--text-lighter);">${order.memberName || ''}</span>
            ${buttons}
        </div>
    </div>`;
}

    await syncToGoogleSheets('updateOrderStatus', { orderId, status: newStatus, callNumber });

function submitCustomerOrder() {
    const name = document.getElementById('customerNameInput').value.trim();
    if (!name) { showToast('⚠️ 请输入您的姓名'); return; }
    if (APP_STATE.customerCart.length === 0) { showToast('⚠️ 购物车是空的'); return; }
    const phone = document.getElementById('customerPhoneInput').value.trim();
    const total = APP_STATE.customerCart.reduce((sum, e) => sum + Number(e.menuItem.price) * e.quantity, 0);
    const orderId = String(++APP_STATE.orderIdCounter);
    localStorage.setItem('orderIdCounter', APP_STATE.orderIdCounter);
    let member = null;
    if (phone) {
        member = APP_STATE.members.find(m => String(m.phone).includes(phone));
        if (member) {
            member.points += Math.floor(total);
            member.totalSpent += total;
        }
    }
    const order = {
    id: orderId,
    date: new Date().toISOString(),
    items: APP_STATE.customerCart.map(e => ({ name: e.menuItem.name, qty: e.quantity, price: Number(e.menuItem.price) })),
    total: total,
    paymentMethod: 'customer_order',
    memberPhone: member ? member.phone : phone,
    memberName: member ? member.name : name,
    paymentDetails: {},
    discountApplied: 0,
    status: 'pending_payment',
    callNumber: ''
};
    APP_STATE.orders.push(order);
    syncToGoogleSheets('addOrder', { order, updatedMember: member });
    document.getElementById('customerCartModal').style.display = 'none';
    APP_STATE.customerCart = [];
    updateCartBadge();
    document.getElementById('customerNameInput').value = '';
    document.getElementById('customerPhoneInput').value = '';
    showToast(`✅ 订单 #${orderId} 已提交! 请等待取餐 🍅`);
}

async function saveMenuItem() {
    const id = document.getElementById('editItemId').value.trim();
    const name = document.getElementById('editItemName').value.trim();
    const desc = document.getElementById('editItemDesc').value.trim();
    const price = parseFloat(document.getElementById('editItemPrice').value);
    const originalPrice = parseFloat(document.getElementById('editItemOrigPrice').value);
    const category = document.getElementById('editItemCategory').value;
    const emoji = document.getElementById('editItemEmoji').value.trim();
    const image = document.getElementById('editItemImage').value.trim();
    const available = document.getElementById('editItemAvailable').checked;

    if (!name || isNaN(price) || !category) {
        showToast('请填写菜品名称、分类和价格');
        return;
    }

    // Construct new/updated item
    const menuItem = {
        id: id || ('I' + Date.now().toString().slice(-6)),
        name,
        desc,
        price,
        originalPrice: isNaN(originalPrice) ? "" : originalPrice,
        category,
        emoji,
        image,
        available
    };

    // Add or update
    const idx = APP_STATE.menu.findIndex(i => i.id === menuItem.id);
    if (idx >= 0) {
        APP_STATE.menu[idx] = menuItem;
        await syncToGoogleSheets('editMenuItem', menuItem);
        showToast('菜品已更新');
    } else {
        APP_STATE.menu.push(menuItem);
        await syncToGoogleSheets('addMenuItem', menuItem);
        showToast('菜品已添加');
    }

    APP_STATE.categories = ['全部', ...new Set(APP_STATE.menu.map(i => i.category))];
    closeMenuEditModal();
    renderAll();
}

// Show/hide "删除" button
function showMenuDeleteBtn(show) {
    let btn = document.getElementById('deleteMenuItemBtn');
    if (!btn) {
        // Create if not exist yet
        btn = document.createElement('button');
        btn.id = "deleteMenuItemBtn";
        btn.className = "btn btn-outline btn-sm";
        btn.style.flex = "1";
        btn.style.background = "#fff2f0";
        btn.style.color = "#e85555";
        btn.innerHTML = "🗑️ 删除";
        btn.onclick = deleteMenuItem;
        // Insert after save button
        let btnRow = document.querySelector('#menuEditModal .modal-sheet > div[style*=gap]');
        if (btnRow) btnRow.appendChild(btn);
    }
    btn.style.display = show ? 'block' : 'none';
}

// Delete menu item
async function deleteMenuItem() {
    const id = document.getElementById('editItemId').value.trim();
    if (!id) return;
    if (!confirm('确定要删除该菜品吗？')) return;
    APP_STATE.menu = APP_STATE.menu.filter(i => i.id !== id);
    await syncToGoogleSheets('deleteMenuItem', {id});
    APP_STATE.categories = ['全部', ...new Set(APP_STATE.menu.map(i => i.category))];
    closeMenuEditModal();
    renderAll();
    showToast('菜品已删除');
}

// Show a grid of existing menu items for edit
function renderAdminMenuGrid() {
    const grid = document.getElementById('adminMenuGrid');
    if (!APP_STATE.adminUnlocked) return grid.innerHTML = '';
    grid.style.display = 'grid';
    grid.innerHTML = APP_STATE.menu.map(item =>
        `<div class="menu-card admin-mode" style="position: relative;">

            <span class="item-emoji">${item.emoji || ''}</span>

            <div class="item-price">RM ${Number(item.price).toFixed(2)}</div>

            <div class="item-name" style="color:#e8784a">添加新菜品</div>
        </div>`;
}
// Call to make window-accessible
window.openMenuEditModal = openMenuEditModal;
window.saveMenuItem = saveMenuItem;
window.deleteMenuItem = deleteMenuItem;
window.renderAdminMenuGrid = renderAdminMenuGrid;

// Always re-render menu grid when unlocking admin mode
function toggleAdminMode() {
    APP_STATE.adminUnlocked = !APP_STATE.adminUnlocked;
    document.getElementById('adminBar').style.display = APP_STATE.adminUnlocked ? 'flex' : 'none';
    document.getElementById('unlockBtn').style.display = APP_STATE.adminUnlocked ? 'none' : 'block';

// ========== CATEGORY MODAL ==========
function openCategoryModal() {
  renderCategoryListModal();
  document.getElementById('categoryModal').style.display = 'flex';
}
function closeCategoryModal(e) {
  if (e && e.target !== document.getElementById('categoryModal')) return;
  document.getElementById('categoryModal').style.display = 'none';
}
document.getElementById('categoryModal').addEventListener('click', function(e) {
  if (e.target === this) this.style.display = 'none';
});

function renderCategoryListModal() {
  const ul = document.getElementById('categoryListUl');
  const cats = APP_STATE.categories.filter(c => c !== '全部');
  ul.innerHTML = cats.map(c => `<li style="display:flex;justify-content:space-between;padding:4px 0;">
    ${c} <button onclick="deleteCategory('${c}')" style="background:none;border:none;color:var(--red);cursor:pointer;">✕</button>
  </li>`).join('');
}

async function deleteCategory(cat) {
  if (!confirm(`删除分类"${cat}"？此分类下的菜品不会被删除，但会失去分类。`)) return;
  APP_STATE.menu.forEach(item => {
    if (item.category === cat) item.category = '其他';
  });
  await Promise.all(APP_STATE.menu.map(item => syncToGoogleSheets('updateMenuItem', item)));
  APP_STATE.categories = ['全部', ...new Set(APP_STATE.menu.map(i => i.category))];
  renderCategoryListModal();
  renderAll();
  showToast(`分类"${cat}"已删除`);
}

// Delegate the add category button inside modal
async function addNewCategory() {
  const name = document.getElementById('newCategoryName').value.trim();
  if (!name) return showToast('请输入名称');
  if (APP_STATE.categories.includes(name)) return showToast('分类已存在');
  APP_STATE.categories.push(name);
  document.getElementById('newCategoryName').value = '';
  renderCategoryListModal();
  // update datalist
  const dl = document.getElementById('categoryList');
  dl.innerHTML = APP_STATE.categories.map(c => `<option value="${c}">`).join('');
  showToast('分类已添加');
}

	function openUnpaidOrdersModal() {
    renderUnpaidOrdersList();
    document.getElementById('unpaidOrdersModal').style.display = 'flex';
}

function closeUnpaidOrdersModal(e) {
    if (e && e.target !== document.getElementById('unpaidOrdersModal')) return;
    document.getElementById('unpaidOrdersModal').style.display = 'none';
}
document.getElementById('unpaidOrdersModal').addEventListener('click', function(e) {
    if (e.target === this) this.style.display = 'none';
});

function renderUnpaidOrdersList() {
    const unpaidOrders = APP_STATE.orders.filter(o => o.status === 'pending_payment');
    const container = document.getElementById('unpaidOrdersList');
    if (unpaidOrders.length === 0) {
        container.innerHTML = '<p style="padding:20px;color:var(--text-lighter);">暂无待付款订单 🎉</p>';
        return;
    }
    container.innerHTML = unpaidOrders.map(order => {
        const items = (typeof order.items === 'string' ? JSON.parse(order.items) : order.items) || [];
        return `
        <div class="order-card" style="margin-bottom:8px;">
            <div><strong>#${order.id}</strong> · ${order.memberName || '顾客'}</div>
            <div style="font-size:0.75rem;">${items.map(i=>`${i.name} x${i.qty}`).join(', ')}</div>

                <span style="font-weight:800;">RM ${Number(order.total).toFixed(2)}</span>

            </div>
        </div>`;
    }).join('');
}

async function payCustomerOrder(orderId) {
    const order = APP_STATE.orders.find(o => o.id === orderId);
    if (!order) return;
    // Open payment modal with this order's total, then on confirm:
    openPaymentModalForOrder(order);
}

// Modified payment modal to handle existing orders
function openPaymentModalForOrder(order) {
    // close unpaid modal
    document.getElementById('unpaidOrdersModal').style.display = 'none';
    // set a global variable to indicate we're paying a customer order
    window.currentPayingOrderId = order.id;
    document.getElementById('payTotalDisplay').textContent = `RM ${Number(order.total).toFixed(2)}`;
    document.getElementById('paymentModal').style.display = 'flex';
    document.getElementById('paymentMethodSelect').value = 'cash';
    showPaymentDetails();
}

// Override finalizePayment to check if we're paying a customer order
const originalFinalizePayment = finalizePayment;
finalizePayment = function() {
    if (window.currentPayingOrderId) {
        finalizeCustomerPayment();
    } else {
        originalFinalizePayment();
    }
};

async function finalizeCustomerPayment() {
    const orderId = window.currentPayingOrderId;
    const order = APP_STATE.orders.find(o => o.id === orderId);
    if (!order) return;
    const method = document.getElementById('paymentMethodSelect').value;
    const total = Number(order.total);
    let paymentDetails = { method };
    if (method === 'cash') {
        const received = parseFloat(document.getElementById('cashReceived').value) || 0;
        if (received < total) { showToast('⚠️ 实收金额不足'); return; }
        paymentDetails.amountTendered = received;
        paymentDetails.change = received - total;
    } else if (method === 'card') {
        paymentDetails.cardType = document.getElementById('cardType').value;
        paymentDetails.cardLast4 = document.getElementById('cardLast4').value;
        paymentDetails.refNum = document.getElementById('cardRefNum').value;
    } else if (method === 'online') {
        paymentDetails.onlineType = document.getElementById('onlineType').value;
        paymentDetails.refNum = document.getElementById('onlineRefNum').value;
    }
    // Update order
    order.status = 'pending';
    order.paymentMethod = method;
    order.paymentDetails = paymentDetails;
    await syncToGoogleSheets('updateOrderStatus', { orderId, status: 'pending' });
    // Also update member points if needed (similar to processPayment)
    const member = APP_STATE.members.find(m => m.phone === order.memberPhone);
    if (member) {
        member.points += Math.floor(total);
        member.totalSpent += total;
        await syncToGoogleSheets('addOrder', { order, updatedMember: member }); // this will also update member points
    }
    document.getElementById('paymentModal').style.display = 'none';
    window.currentPayingOrderId = null;
    renderFulfillmentView();
    renderUnpaidOrdersList();
    showToast(`✅ 订单 #${orderId} 已收款`);
}

	async function uploadMenuImage() {
    const input = document.getElementById('editItemImageUpload');
    if (!input.files || !input.files[0]) {
        showToast('请选择图片文件');
        return;
    }
    const file = input.files[0];
    const menuId = document.getElementById('editItemId').value || '';
    showToast('图片上传中…');
    const formData = new FormData();
    formData.append('file', file);
    formData.append('menuId', menuId);

    try {
        const uploadUrl = APP_STATE.gasUrl;  // Use the same URL from settings
        const resp = await fetch(uploadUrl, { method: 'POST', body: formData });
        const json = await resp.json();
        if (json.success) {
            showToast('图片已上传');
            document.getElementById('editItemImage').value = json.url;
            let prev = document.getElementById('menuImagePreview');
            if (!prev) {
                prev = document.createElement('img');
                prev.style.maxWidth = '100px';
                prev.style.marginTop = '4px';
                prev.id = 'menuImagePreview';
                document.getElementById('editItemImageUpload').parentNode.appendChild(prev);
            }
            prev.src = json.url;
        } else {
            showToast('上传失败: ' + json.error);
        }
    } catch (err) {
        showToast('上传错误: ' + err.message);
    }
}
