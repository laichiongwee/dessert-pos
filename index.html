<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍅 柿柿润糖水 - POS System</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">
    </script>
    <style>
        :root {
            --persimmon: #E8784A;
            --persimmon-light: #FDE8DF;
            --persimmon-dark: #C45A2E;
            --cream: #FFF8F3;
            --white: #FFFFFF;
            --card: #FFFFFF;
            --text: #3D2020;
            --text-light: #6B4E4E;
            --text-lighter: #9B7E7E;
            --border: #F0E0D6;
            --shadow: 0 2px 16px rgba(232, 120, 74, 0.08);
            --shadow-lg: 0 8px 32px rgba(232, 120, 74, 0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 8px;
            --green: #4CAF84;
            --green-light: #E8F6EF;
            --red: #E85555;
            --red-light: #FDE8E8;
            --gold: #F0A855;
            --gold-light: #FFF6EB;
            --bottom-nav-height: 64px;
            --header-height: 56px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #FFF5EF;
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }

        /* ============ HEADER ============ */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--white);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px 8px rgba(0, 0, 0, 0.04);
            height: var(--header-height);
            gap: 10px;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--persimmon);
            white-space: nowrap;
            letter-spacing: -0.3px;
        }
        .header-brand .icon {
            font-size: 1.6rem;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-6px);
            }
            50% {
                transform: translateY(0);
            }
            70% {
                transform: translateY(-3px);
            }
        }
        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .btn {
            padding: 9px 16px;
            border-radius: 24px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            font-family: inherit;
            transition: var(--transition);
            white-space: nowrap;
            letter-spacing: -0.2px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            touch-action: manipulation;
        }
        .btn:active {
            transform: scale(0.95);
            transition: 0.1s;
        }
        .btn-primary {
            background: var(--persimmon);
            color: white;
            box-shadow: 0 2px 8px rgba(232, 120, 74, 0.3);
        }
        .btn-primary:hover {
            background: var(--persimmon-dark);
            box-shadow: 0 4px 16px rgba(232, 120, 74, 0.4);
        }
        .btn-outline {
            background: var(--white);
            color: var(--persimmon);
            border: 2px solid var(--persimmon);
        }
        .btn-outline:hover {
            background: var(--persimmon-light);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.78rem;
            border-radius: 18px;
        }
        .btn-xs {
            padding: 4px 10px;
            font-size: 0.7rem;
            border-radius: 14px;
            font-weight: 600;
        }
        .btn-ghost {
            background: transparent;
            border: none;
            color: var(--text-light);
            padding: 6px 8px;
            font-size: 0.8rem;
        }
        .btn-ghost:hover {
            color: var(--persimmon);
            background: var(--persimmon-light);
            border-radius: 20px;
        }
        .btn-danger {
            background: var(--red);
            color: white;
        }
        .btn-success {
            background: var(--green);
            color: white;
        }

        /* ============ MODE SWITCHER ============ */
        .mode-switch {
            display: flex;
            background: #F5E8E0;
            border-radius: 24px;
            padding: 3px;
            gap: 2px;
        }
        .mode-switch button {
            padding: 7px 14px;
            border-radius: 22px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.78rem;
            font-family: inherit;
            transition: var(--transition);
            background: transparent;
            color: var(--text-light);
            white-space: nowrap;
        }
        .mode-switch button.active {
            background: var(--white);
            color: var(--persimmon);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        /* ============ MAIN CONTENT ============ */
        .main-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 12px 12px 100px;
            display: none;
        }
        .main-container.active {
            display: block;
            animation: fadeSlideIn 0.35s ease;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ CASHIER LAYOUT ============ */
        .cashier-layout {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .menu-panel {
            flex: 1 1 320px;
            min-width: 280px;
        }
        .order-panel {
            flex: 0 0 340px;
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 16px;
            position: sticky;
            top: 72px;
            align-self: flex-start;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        @media (max-width: 768px) {
            .cashier-layout {
                flex-direction: column;
            }
            .order-panel {
                flex: 0 0 auto;
                position: static;
                max-height: none;
                order: -1;
                margin-bottom: 8px;
                border-radius: var(--radius-sm);
                padding: 12px;
            }
            .menu-panel {
                min-width: 100%;
            }
            .header-brand span {
                font-size: 0.9rem;
            }
            .mode-switch button {
                padding: 5px 10px;
                font-size: 0.7rem;
            }
            .btn {
                padding: 7px 12px;
                font-size: 0.78rem;
            }
        }

        /* ============ CATEGORY TABS ============ */
        .category-tabs {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 4px 0 12px;
            scrollbar-width: none;
            -ms-overflow-style: none;
            flex-wrap: nowrap;
        }
        .category-tabs::-webkit-scrollbar {
            display: none;
        }
        .cat-tab {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            white-space: nowrap;
            transition: var(--transition);
            background: var(--white);
            color: var(--text-light);
            flex-shrink: 0;
            font-family: inherit;
        }
        .cat-tab.active {
            background: var(--persimmon);
            color: white;
            border-color: var(--persimmon);
            box-shadow: 0 2px 8px rgba(232, 120, 74, 0.25);
        }
        .cat-tab:active {
            transform: scale(0.94);
        }

        /* ============ MENU CARDS ============ */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }
        @media (max-width: 400px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
        }
        .menu-card {
            background: var(--white);
            border-radius: var(--radius-sm);
            padding: 10px;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
        }
        .menu-card:active {
            transform: scale(0.96);
            transition: 0.1s;
            border-color: var(--persimmon);
            box-shadow: var(--shadow-lg);
        }
        .menu-card:hover {
            border-color: #F0C8B4;
            box-shadow: var(--shadow-lg);
        }
        .menu-card .item-emoji {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 4px;
            line-height: 1;
        }
        .menu-card .item-img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 6px;
            background: #FDF5F0;
        }
        .menu-card .item-name {
            font-weight: 700;
            font-size: 0.82rem;
            color: var(--text);
            line-height: 1.2;
            margin-bottom: 2px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .menu-card .item-desc {
            font-size: 0.68rem;
            color: var(--text-lighter);
            margin-bottom: 4px;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .menu-card .item-price {
            font-weight: 800;
            font-size: 0.95rem;
            color: var(--persimmon);
        }
        .menu-card .item-price .original {
            text-decoration: line-through;
            font-size: 0.7rem;
            color: #C0A0A0;
            font-weight: 500;
            margin-left: 4px;
        }
        .menu-card .badge-sale {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--red);
            color: white;
            font-size: 0.6rem;
            padding: 3px 7px;
            border-radius: 10px;
            font-weight: 700;
        }
        .menu-card.out-of-stock {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(30%);
        }
        .menu-card.out-of-stock::after {
            content: '售罄';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-25deg);
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--red);
            background: rgba(255, 255, 255, 0.85);
            padding: 6px 16px;
            border-radius: 8px;
            letter-spacing: 2px;
        }

        /* ============ ORDER PANEL ============ */
        .order-panel h3 {
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 12px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .order-items {
            flex: 1;
            overflow-y: auto;
            max-height: 280px;
            margin-bottom: 8px;
        }
        .order-item-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid #FBF0E8;
            font-size: 0.8rem;
        }
        .order-item-row .oi-name {
            flex: 1;
            font-weight: 600;
            font-size: 0.78rem;
            line-height: 1.2;
        }
        .order-item-row .oi-qty {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .order-item-row .oi-qty button {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--white);
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            color: var(--text);
            touch-action: manipulation;
        }
        .order-item-row .oi-qty button:active {
            background: var(--persimmon-light);
            border-color: var(--persimmon);
        }
        .order-item-row .oi-qty span {
            min-width: 20px;
            text-align: center;
            font-weight: 700;
        }
        .order-item-row .oi-price {
            font-weight: 700;
            color: var(--persimmon);
            min-width: 50px;
            text-align: right;
            font-size: 0.8rem;
        }
        .order-item-row .oi-del {
            background: none;
            border: none;
            color: #C0A0A0;
            cursor: pointer;
            font-size: 1rem;
            padding: 2px 4px;
            transition: var(--transition);
        }
        .order-item-row .oi-del:active {
            color: var(--red);
        }
        .order-summary {
            border-top: 2px solid #F0D8C8;
            padding-top: 10px;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .order-summary .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--persimmon);
            margin: 4px 0;
        }
        .order-empty {
            text-align: center;
            color: #C0A0A0;
            padding: 30px 0;
            font-size: 0.85rem;
        }
        .order-empty .icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 8px;
        }

        /* ============ MEMBER SECTION ============ */
        .member-section {
            background: var(--gold-light);
            border-radius: var(--radius-xs);
            padding: 10px 12px;
            margin: 8px 0;
            font-size: 0.78rem;
            border: 1px solid #F5E0C0;
        }
        .member-section .member-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .member-section .member-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
            font-weight: 700;
            flex-shrink: 0;
        }
        .member-search {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .member-search input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            font-family: inherit;
            font-size: 0.8rem;
            background: var(--white);
            min-width: 0;
        }
        .member-search input:focus {
            outline: none;
            border-color: var(--persimmon);
            box-shadow: 0 0 0 3px rgba(232, 120, 74, 0.08);
        }

        /* ============ CUSTOMER VIEW ============ */
        .customer-hero {
            text-align: center;
            padding: 20px 16px 8px;
        }
        .customer-hero h1 {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--persimmon);
            letter-spacing: -0.5px;
        }
        .customer-hero p {
            color: var(--text-light);
            font-size: 0.85rem;
        }
        .customer-menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }
        @media (max-width: 400px) {
            .customer-menu-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
        }
        .customer-cart-fab {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--persimmon);
            color: white;
            padding: 12px 24px;
            border-radius: 28px;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(232, 120, 74, 0.4);
            border: none;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            font-family: inherit;
            touch-action: manipulation;
        }
        .customer-cart-fab:active {
            transform: translateX(-50%) scale(0.94);
            transition: 0.1s;
        }
        .customer-cart-fab .badge {
            background: white;
            color: var(--persimmon);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 800;
        }

        /* ============ MODAL ============ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal-sheet {
            background: var(--white);
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 20px 16px 28px;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }
        .modal-handle {
            width: 40px;
            height: 4px;
            background: #D0C0B8;
            border-radius: 2px;
            margin: 0 auto 12px;
        }

        /* ============ QR MODAL ============ */
        .qr-container {
            text-align: center;
            padding: 16px;
        }
        .qr-container canvas,
        .qr-container img {
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
        }
        #qrcode {
            display: inline-block;
            padding: 12px;
            background: white;
            border-radius: 12px;
        }
        .qr-url {
            font-size: 0.7rem;
            color: var(--text-lighter);
            word-break: break-all;
            margin-top: 8px;
            background: #FDF5F0;
            padding: 8px;
            border-radius: 8px;
        }

        /* ============ TOAST ============ */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #3D2020;
            color: white;
            padding: 10px 20px;
            border-radius: 24px;
            font-weight: 600;
            font-size: 0.85rem;
            z-index: 300;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
            pointer-events: none;
            white-space: nowrap;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
        }

        /* ============ SETTINGS PANEL ============ */
        .settings-row {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            padding: 4px 0;
        }
        .settings-row input {
            flex: 1;
            min-width: 140px;
            padding: 7px 10px;
            border-radius: 16px;
            border: 1.5px solid var(--border);
            font-family: inherit;
            font-size: 0.75rem;
        }
        .settings-row input:focus {
            outline: none;
            border-color: var(--persimmon);
        }

        /* ============ SCROLLBAR ============ */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #E0C8B8;
            border-radius: 4px;
        }

        /* print */
        @media print {
            body {
                background: white;
            }
            .header,
            .category-tabs,
            .customer-cart-fab,
            .btn,
            .mode-switch,
            .member-search,
            .settings-row {
                display: none !important;
            }
            .order-panel {
                box-shadow: none;
                border: 1px solid #ccc;
                position: static;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== HEADER ==================== -->
    <header class="header">
        <div class="header-brand">
            <span class="icon">🍅</span>
            <span>柿柿润糖水</span>
        </div>
        <div class="header-actions">
            <div class="mode-switch" id="modeSwitcher">
                <button data-mode="cashier" class="active" onclick="switchMode('cashier')">💰 收银</button>
                <button data-mode="customer" onclick="switchMode('customer')">📱 顾客</button>
            </div>
            <button class="btn btn-outline btn-sm" onclick="openQRModal()" title="顾客扫码点餐">🔗 QR</button>
            <button class="btn btn-ghost btn-sm" onclick="openSettings()">⚙️</button>
        </div>
    </header>

    <!-- ==================== CASHIER VIEW ==================== -->
    <div class="main-container active" id="cashierView">
        <div class="cashier-layout">
            <!-- Menu Panel -->
            <div class="menu-panel">
                <div class="category-tabs" id="categoryTabs"></div>
                <div class="menu-grid" id="menuGrid"></div>
            </div>
            <!-- Order Panel -->
            <div class="order-panel" id="orderPanel">
                <h3>🧾 当前订单</h3>
                <div class="order-items" id="orderItems">
                    <div class="order-empty"><span class="icon">🛒</span>点击菜单添加商品</div>
                </div>
                <!-- Member Search -->
                <div class="member-section" id="memberSection">
                    <div class="member-search">
                        <input type="tel" id="memberPhoneInput" placeholder="📞 会员手机号查找..." oninput="searchMember()">
                        <button class="btn btn-xs btn-outline" onclick="clearMember()">清除</button>
                    </div>
                    <div id="memberInfoDisplay" style="margin-top:6px;font-size:0.75rem;color:var(--text-light);"></div>
                </div>
                <div class="order-summary">
                    <div style="display:flex;justify-content:space-between;font-size:0.8rem;color:var(--text-light);">
                        <span>小计</span><span id="subtotalDisplay">RM 0.00</span>
                    </div>

                设置 Google Sheets 后，菜单、会员和订单将自动同步。未设置时使用本地演示数据。

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <script>
        // ==================== GLOBAL STATE ====================
        const APP_STATE = {
            mode: 'cashier', // 'cashier' | 'customer'
            menu: [], // {id, name, description, price, originalPrice, category, emoji, imageUrl, available}
            categories: [],
            activeCategory: '全部',
            cashierOrder: [], // {menuItem, quantity}
            customerCart: [], // {menuItem, quantity}
            members: [], // {id, name, phone, points, totalSpent}
            currentMember: null,
            orders: [], // {id, date, items, total, paymentMethod, memberPhone, memberName}
            gasUrl: localStorage.getItem('gasUrl') || '',
            orderIdCounter: parseInt(localStorage.getItem('orderIdCounter') || '1000'),
        };

        // ==================== DEMO DATA ====================
        function getDemoMenu() {
            return [
                { id: '01', name: '柿柿润糖水', description: '招牌糖水 · 清甜滋润', price: 10.00, originalPrice: null,
                    category: '糖水', emoji: '🍅', imageUrl: '', available: true },
                { id: '02', name: 'Milk Mochi', description: 'Milk, Mochi, Riceball', price: 7.00, originalPrice: null,
                    category: '麻薯', emoji: '🥛', imageUrl: '', available: true },
                { id: '03', name: 'Mango Mochi', description: 'Mango, Milk, Mochi, Riceball', price: 12.00,
                    originalPrice: null, category: '麻薯', emoji: '🥭', imageUrl: '', available: true },
                { id: '04', name: '芋泥圆麻薯', description: 'Taro, Mochi, Taroball, Riceball', price: 13.00,
                    originalPrice: null, category: '麻薯', emoji: '🍠', imageUrl: '', available: true },
                { id: '05', name: '芋圆大盒', description: '满满芋圆 · 大份满足', price: 10.00, originalPrice: null,
                    category: '芋圆', emoji: '🟣', imageUrl: '', available: true },
                { id: '06', name: 'Fruit Ice with Rice Ball',
                    description: 'Watermelon, Mango, Peach, Longan, Jelly', price: 8.00, originalPrice: null,
                    category: '冰品', emoji: '🍧', imageUrl: '', available: true },
                { id: '07', name: 'Taroball Original Addon Green Jelly',
                    description: 'Taroball, RedBean, BlackJelly & GreenJelly', price: 7.00, originalPrice: null,
                    category: '芋圆', emoji: '🫘', imageUrl: '', available: true },
                { id: '08', name: 'Original Taroball', description: 'Taroball, BlackJelly & RedBean', price: 6.00,
                    originalPrice: null, category: '芋圆', emoji: '⚫', imageUrl: '', available: true },
                { id: '09', name: 'No Rice Sushi 无米寿司', description: '创新无米寿司', price: 12.00, originalPrice: null,
                    category: '特色', emoji: '🍣', imageUrl: '', available: true },
                { id: '10', name: '红糖绿仙草', description: 'Handmade Green Jelly & Red Sugar', price: 6.00,
                    originalPrice: 7.00, category: '糖水', emoji: '🌿', imageUrl: '', available: true },
                { id: '11', name: '芋泥娜娜', description: '芋泥，麻薯，仙草', price: 8.00, originalPrice: null, category: '糖水',
                    emoji: '💜', imageUrl: '', available: true },
                { id: '12', name: '大粒又甜的草莓干', description: '大粒草莓干 · 超甜', price: 18.00, originalPrice: 28.00,
                    category: '零食', emoji: '🍓', imageUrl: '', available: true },
                { id: '13', name: 'Set A', description: '超值套餐A', price: 30.00, originalPrice: null, category: '套餐',
                    emoji: '🎀', imageUrl: '', available: true },
                { id: '14', name: 'Set B', description: '豪华套餐B', price: 55.00, originalPrice: null, category: '套餐',
                    emoji: '🎁', imageUrl: '', available: true },
            ];
        }

        function getDemoMembers() {
            return [
                { id: 'M001', name: '小明', phone: '0123456789', points: 120, totalSpent: 240.00 },
                { id: 'M002', name: '阿花', phone: '0178369622', points: 85, totalSpent: 170.00 },
                { id: 'M003', name: 'David', phone: '0108476666', points: 200, totalSpent: 400.00 },
            ];
        }

        function getDemoOrders() {
            return [
                { id: '1001', date: '2026-05-08T10:30:00', items: [{ name: 'Milk Mochi', qty: 2, price: 7.00 },
                        { name: '柿柿润糖水', qty: 1, price: 10.00 }
                    ], total: 24.00, paymentMethod: 'cash', memberPhone: '', memberName: '' },
            ];
        }

        // ==================== INITIALIZATION ====================
        function init() {
            loadDemoData();
            if (APP_STATE.gasUrl) {
                fetchFromGoogleSheets().catch(() => {
                    console.log('Google Sheets 连接失败，使用本地数据');
                });
            }
            renderAll();
            updateQRCode();
        }

        function loadDemoData() {
            APP_STATE.menu = getDemoMenu();
            APP_STATE.categories = ['全部', ...new Set(APP_STATE.menu.map(item => item.category))];
            APP_STATE.members = getDemoMembers();
            APP_STATE.orders = getDemoOrders();
            APP_STATE.activeCategory = '全部';
        }

        async function fetchFromGoogleSheets() {
            if (!APP_STATE.gasUrl) return;
            const url = APP_STATE.gasUrl + '?action=getAll';
            const resp = await fetch(url, { method: 'GET' });
            const data = await resp.json();
            if (data.menu) APP_STATE.menu = data.menu;
            if (data.members) APP_STATE.members = data.members;
            if (data.orders) {
                APP_STATE.orders = data.orders;
                APP_STATE.orderIdCounter = Math.max(...data.orders.map(o => parseInt(o.id) || 0), APP_STATE
                    .orderIdCounter);
            }
            APP_STATE.categories = ['全部', ...new Set(APP_STATE.menu.map(item => item.category))];
            renderAll();
        }

        async function syncToGoogleSheets(action, payload) {
            if (!APP_STATE.gasUrl) return null;
            try {
                const resp = await fetch(APP_STATE.gasUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, ...payload }),
                });
                return await resp.json();
            } catch (e) {
                console.error('同步失败:', e);
                return null;
            }
        }

        // ==================== RENDER ====================
        function renderAll() {
            renderCategoryTabs();
            renderMenuGrid();
            renderOrderPanel();
            renderCustomerCategoryTabs();
            renderCustomerMenuGrid();
            updateCartBadge();
        }

        function renderCategoryTabs() {
            const container = document.getElementById('categoryTabs');
            container.innerHTML = APP_STATE.categories.map(cat =>
                `<button class="cat-tab${cat === APP_STATE.activeCategory ? ' active' : ''}" onclick="setCategory('${cat}')">${cat}</button>`
            ).join('');
        }

        function renderCustomerCategoryTabs() {
            const container = document.getElementById('customerCategoryTabs');
            container.innerHTML = APP_STATE.categories.map(cat =>
                `<button class="cat-tab${cat === APP_STATE.activeCategory ? ' active' : ''}" onclick="setCategory('${cat}')">${cat}</button>`
            ).join('');
        }

        function setCategory(cat) {
            APP_STATE.activeCategory = cat;
            renderAll();
        }

        function getFilteredMenu() {
            if (APP_STATE.activeCategory === '全部') return APP_STATE.menu;
            return APP_STATE.menu.filter(item => item.category === APP_STATE.activeCategory);
        }

        function renderMenuGrid() {
            const grid = document.getElementById('menuGrid');
            const items = getFilteredMenu();
            grid.innerHTML = items.map(item => {
                const hasSale = item.originalPrice && item.originalPrice > item.price;
                const imgHtml = item.imageUrl ?
                    `<img src="${item.imageUrl}" class="item-img" alt="${item.name}" loading="lazy" onerror="this.style.display='none';">` :
                    '';
                return `
                <div class="menu-card${item.available ? '' : ' out-of-stock'}" onclick="${item.available ? `addToOrder('${item.id}')` : ''}">
                    ${hasSale ? '<span class="badge-sale">优惠</span>' : ''}
                    ${imgHtml || `<span class="item-emoji">${item.emoji || '🍴'}</span>`}
                    <div class="item-name">${item.name}</div>
                    <div class="item-desc">${item.description || ''}</div>
                    <div class="item-price">
                        RM ${item.price.toFixed(2)}
                        ${hasSale ? `<span class="original">RM ${item.originalPrice.toFixed(2)}</span>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        function renderCustomerMenuGrid() {
            const grid = document.getElementById('customerMenuGrid');
            const items = getFilteredMenu();
            grid.innerHTML = items.map(item => {
                const hasSale = item.originalPrice && item.originalPrice > item.price;
                const imgHtml = item.imageUrl ?
                    `<img src="${item.imageUrl}" class="item-img" alt="${item.name}" loading="lazy" onerror="this.style.display='none';">` :
                    '';
                return `
                <div class="menu-card${item.available ? '' : ' out-of-stock'}" onclick="${item.available ? `addToCustomerCart('${item.id}')` : ''}">
                    ${hasSale ? '<span class="badge-sale">优惠</span>' : ''}
                    ${imgHtml || `<span class="item-emoji">${item.emoji || '🍴'}</span>`}
                    <div class="item-name">${item.name}</div>
                    <div class="item-desc">${item.description || ''}</div>
                    <div class="item-price">
                        RM ${item.price.toFixed(2)}
                        ${hasSale ? `<span class="original">RM ${item.originalPrice.toFixed(2)}</span>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        function renderOrderPanel() {
            const container = document.getElementById('orderItems');
            if (APP_STATE.cashierOrder.length === 0) {
                container.innerHTML = '<div class="order-empty"><span class="icon">🛒</span>点击菜单添加商品</div>';
            } else {
                container.innerHTML = APP_STATE.cashierOrder.map((entry, idx) => `
                <div class="order-item-row">
                    <span class="oi-name">${entry.menuItem.name}</span>
                    <div class="oi-qty">
                        <button onclick="adjustOrderQty(${idx}, -1)">−</button>
                        <span>${entry.quantity}</span>
                        <button onclick="adjustOrderQty(${idx}, 1)">+</button>
                    </div>
                    <span class="oi-price">RM ${(entry.menuItem.price * entry.quantity).toFixed(2)}</span>
                    <button class="oi-del" onclick="removeFromOrder(${idx})">✕</button>
                </div>
                `).join('');
            }
            updateOrderTotals();
            updateMemberDisplay();
        }

        function updateOrderTotals() {
            const subtotal = APP_STATE.cashierOrder.reduce((sum, e) => sum + e.menuItem.price * e.quantity, 0);
            let discount = 0;
            if (APP_STATE.currentMember && APP_STATE.currentMember.points >= 50) {
                discount = Math.min(subtotal * 0.1, APP_STATE.currentMember.points * 0.05);
                discount = Math.round(discount * 100) / 100;
            }
            const total = Math.max(0, subtotal - discount);
            document.getElementById('subtotalDisplay').textContent = `RM ${subtotal.toFixed(2)}`;
            const discountRow = document.getElementById('discountRow');
            if (discount > 0) {
                discountRow.hidden = false;
                document.getElementById('discountDisplay').textContent = `-RM ${discount.toFixed(2)}`;
            } else {
                discountRow.hidden = true;
            }
            document.getElementById('totalDisplay').textContent = `RM ${total.toFixed(2)}`;
        }

        function updateMemberDisplay() {
            const display = document.getElementById('memberInfoDisplay');
            const input = document.getElementById('memberPhoneInput');
            if (APP_STATE.currentMember) {
                display.innerHTML = `
                <div class="member-info">
                    <div class="member-avatar">${APP_STATE.currentMember.name.charAt(0)}</div>
                    <div>
                        <strong>${APP_STATE.currentMember.name}</strong> · 积分: ${APP_STATE.currentMember.points} · 
                        累计消费: RM ${APP_STATE.currentMember.totalSpent.toFixed(2)}
                        ${APP_STATE.currentMember.points >= 50 ? ' 🎉可兑换折扣' : ''}
                    </div>
                </div>`;
                input.value = APP_STATE.currentMember.phone;
            } else {
                display.innerHTML = '<span style="color:#C0A0A0;">未关联会员</span>';
            }
            updateOrderTotals();
        }

        // ==================== ORDER ACTIONS (CASHIER) ====================
        function addToOrder(itemId) {
            const item = APP_STATE.menu.find(m => m.id === itemId);
            if (!item || !item.available) return;
            const existing = APP_STATE.cashierOrder.find(e => e.menuItem.id === itemId);
            if (existing) {
                existing.quantity++;
            } else {
                APP_STATE.cashierOrder.push({ menuItem: item, quantity: 1 });
            }
            renderOrderPanel();
            showToast(`已添加: ${item.name}`);
        }

        function adjustOrderQty(index, delta) {
            APP_STATE.cashierOrder[index].quantity += delta;
            if (APP_STATE.cashierOrder[index].quantity <= 0) {
                APP_STATE.cashierOrder.splice(index, 1);
            }
            renderOrderPanel();
        }

        function removeFromOrder(index) {
            APP_STATE.cashierOrder.splice(index, 1);
            renderOrderPanel();
        }

        function clearOrder() {
            APP_STATE.cashierOrder = [];
            APP_STATE.currentMember = null;
            document.getElementById('memberPhoneInput').value = '';
            renderOrderPanel();
            showToast('订单已清空');
        }

        function getOrderTotal() {
            const subtotal = APP_STATE.cashierOrder.reduce((sum, e) => sum + e.menuItem.price * e.quantity, 0);
            let discount = 0;
            if (APP_STATE.currentMember && APP_STATE.currentMember.points >= 50) {
                discount = Math.min(subtotal * 0.1, APP_STATE.currentMember.points * 0.05);
                discount = Math.round(discount * 100) / 100;
            }
            return Math.max(0, subtotal - discount);
        }

        function checkout() {
            if (APP_STATE.cashierOrder.length === 0) {
                showToast('⚠️ 请先添加商品');
                return;
            }
            const total = getOrderTotal();
            const method = confirm('选择支付方式:\n确定 = 现金 💵\n取消 = 电子钱包 📱') ? 'cash' : 'ewallet';
            processPayment(method, total);
        }

        function quickPayment(method) {
            if (APP_STATE.cashierOrder.length === 0) {
                showToast('⚠️ 请先添加商品');
                return;
            }
            const total = getOrderTotal();
            processPayment(method, total);
        }

        function processPayment(method, total) {
            const orderId = String(++APP_STATE.orderIdCounter);
            localStorage.setItem('orderIdCounter', APP_STATE.orderIdCounter);
            const order = {
                id: orderId,
                date: new Date().toISOString(),
                items: APP_STATE.cashierOrder.map(e => ({ name: e.menuItem.name, qty: e.quantity, price: e.menuItem
                        .price })),
                total: total,
                paymentMethod: method,
                memberPhone: APP_STATE.currentMember ? APP_STATE.currentMember.phone : '',
                memberName: APP_STATE.currentMember ? APP_STATE.currentMember.name : '',
            };
            APP_STATE.orders.push(order);

            // Update member points
            if (APP_STATE.currentMember) {
                const pointsEarned = Math.floor(total);
                APP_STATE.currentMember.points += pointsEarned;
                APP_STATE.currentMember.totalSpent += total;
                // Apply discount (deduct points used)
                const subtotal = APP_STATE.cashierOrder.reduce((sum, e) => sum + e.menuItem.price * e.quantity, 0);
                const discount = subtotal - total;
                if (discount > 0) {
                    const pointsUsed = Math.ceil(discount / 0.05);
                    APP_STATE.currentMember.points = Math.max(0, APP_STATE.currentMember.points - pointsUsed);
                }
            }

            // Sync to Google Sheets
            syncToGoogleSheets('addOrder', { order, updatedMember: APP_STATE.currentMember });

            // Print receipt-like summary
            const methodLabels = { cash: '现金 💵', ewallet: '电子钱包 📱', card: '刷卡 💳' };
            const receiptMsg = `
        🧾 订单 #${orderId}
        ────────────────
        ${order.items.map(i => `${i.name} x${i.qty}  RM ${(i.price*i.qty).toFixed(2)}`).join('\n')}
        ────────────────
        总计: RM ${total.toFixed(2)}
        支付: ${methodLabels[method] || method}
        ${APP_STATE.currentMember ? `会员: ${APP_STATE.currentMember.name} · 积分+${Math.floor(total)}` : ''}
        ────────────────
        谢谢惠顾! 🍅
          `.trim();
            alert(receiptMsg);

            // Clear
            APP_STATE.cashierOrder = [];
            APP_STATE.currentMember = null;
            document.getElementById('memberPhoneInput').value = '';
            renderOrderPanel();
            showToast(`✅ 订单 #${orderId} 已完成!`);
        }

        // ==================== MEMBER ====================
        function searchMember() {
            const phone = document.getElementById('memberPhoneInput').value.trim();
            if (phone.length < 3) {
                APP_STATE.currentMember = null;
                updateMemberDisplay();
                return;
            }
            const member = APP_STATE.members.find(m => m.phone.includes(phone));
            if (member) {
                APP_STATE.currentMember = member;
            } else {
                APP_STATE.currentMember = null;
            }
            updateMemberDisplay();
        }

        function clearMember() {
            APP_STATE.currentMember = null;
            document.getElementById('memberPhoneInput').value = '';
            updateMemberDisplay();
        }

        // ==================== CUSTOMER CART ====================
        function addToCustomerCart(itemId) {
            const item = APP_STATE.menu.find(m => m.id === itemId);
            if (!item || !item.available) return;
            const existing = APP_STATE.customerCart.find(e => e.menuItem.id === itemId);
            if (existing) {
                existing.quantity++;
            } else {
                APP_STATE.customerCart.push({ menuItem: item, quantity: 1 });
            }
            updateCartBadge();
            showToast(`已添加: ${item.name}`);
        }

        function updateCartBadge() {
            const count = APP_STATE.customerCart.reduce((sum, e) => sum + e.quantity, 0);
            document.getElementById('cartCountBadge').textContent = count;
            const fab = document.getElementById('customerCartFab');
            if (count === 0) {
                fab.style.opacity = '0.6';
            } else {
                fab.style.opacity = '1';
            }
        }

        function openCustomerCart() {
            if (APP_STATE.customerCart.length === 0) {
                showToast('🛒 购物车是空的');
                return;
            }
            renderCustomerCartModal();
            document.getElementById('customerCartModal').style.display = 'flex';
        }

        function closeCustomerCartModal(event) {
            if (event && event.target !== document.getElementById('customerCartModal')) return;
            document.getElementById('customerCartModal').style.display = 'none';
        }
        document.getElementById('customerCartModal').addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });

        function renderCustomerCartModal() {
            const container = document.getElementById('customerCartItems');
            const total = APP_STATE.customerCart.reduce((sum, e) => sum + e.menuItem.price * e.quantity, 0);
            container.innerHTML = APP_STATE.customerCart.map((entry, idx) => `
                <div class="order-item-row">
                    <span class="oi-name">${entry.menuItem.name}</span>
                    <div class="oi-qty">
                        <button onclick="adjustCustomerCart(${idx}, -1)">−</button>
                        <span>${entry.quantity}</span>
                        <button onclick="adjustCustomerCart(${idx}, 1)">+</button>
                    </div>
                    <span class="oi-price">RM ${(entry.menuItem.price * entry.quantity).toFixed(2)}</span>
                </div>
            `).join('');
            document.getElementById('customerCartTotal').textContent = `RM ${total.toFixed(2)}`;
        }

        function adjustCustomerCart(index, delta) {
            APP_STATE.customerCart[index].quantity += delta;
            if (APP_STATE.customerCart[index].quantity <= 0) {
                APP_STATE.customerCart.splice(index, 1);
            }
            if (APP_STATE.customerCart.length === 0) {
                document.getElementById('customerCartModal').style.display = 'none';
            }
            renderCustomerCartModal();
            updateCartBadge();
        }

        function submitCustomerOrder() {
            const name = document.getElementById('customerNameInput').value.trim();
            if (!name) {
                showToast('⚠️ 请输入您的姓名');
                return;
            }
            if (APP_STATE.customerCart.length === 0) {
                showToast('⚠️ 购物车是空的');
                return;
            }
            const phone = document.getElementById('customerPhoneInput').value.trim();
            const total = APP_STATE.customerCart.reduce((sum, e) => sum + e.menuItem.price * e.quantity, 0);
            const orderId = String(++APP_STATE.orderIdCounter);
            localStorage.setItem('orderIdCounter', APP_STATE.orderIdCounter);

            // Check if phone matches a member
            let member = null;
            if (phone) {
                member = APP_STATE.members.find(m => m.phone.includes(phone));
                if (member) {
                    member.points += Math.floor(total);
                    member.totalSpent += total;
                }
            }

            const order = {
                id: orderId,
                date: new Date().toISOString(),
                items: APP_STATE.customerCart.map(e => ({ name: e.menuItem.name, qty: e.quantity, price: e.menuItem
                        .price })),
                total: total,
                paymentMethod: 'customer_order',
                memberPhone: member ? member.phone : phone,
                memberName: member ? member.name : name,
            };
            APP_STATE.orders.push(order);
            syncToGoogleSheets('addOrder', { order, updatedMember: member });

            document.getElementById('customerCartModal').style.display = 'none';
            APP_STATE.customerCart = [];
            updateCartBadge();
            document.getElementById('customerNameInput').value = '';
            document.getElementById('customerPhoneInput').value = '';
            showToast(`✅ 订单 #${orderId} 已提交! 请等待取餐 🍅`);
        }

        // ==================== MODE SWITCH ====================
        function switchMode(mode) {
            APP_STATE.mode = mode;
            document.querySelectorAll('#modeSwitcher button').forEach(b => b.classList.remove('active'));
            document.querySelector(`#modeSwitcher button[data-mode="${mode}"]`).classList.add('active');
            document.getElementById('cashierView').classList.toggle('active', mode === 'cashier');
            document.getElementById('customerView').classList.toggle('active', mode === 'customer');
            if (mode === 'customer') {
                APP_STATE.activeCategory = '全部';
                renderCustomerCategoryTabs();
                renderCustomerMenuGrid();
                updateCartBadge();
            } else {
                renderCategoryTabs();
                renderMenuGrid();
                renderOrderPanel();
            }
        }

        // ==================== QR CODE ====================
        function updateQRCode() {
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            const url = window.location.origin + window.location.pathname + '?mode=customer';
            document.getElementById('qrUrlDisplay').textContent = url;
            try {
                new QRCode(qrContainer, {
                    text: url,
                    width: 180,
                    height: 180,
                    colorDark: '#3D2020',
                    colorLight: '#FFFFFF',
                    correctLevel: QRCode.CorrectLevel.M,
                });
            } catch (e) {
                qrContainer.innerHTML =
                    '<p style="padding:40px;background:#FDF5F0;border-radius:12px;">QR码生成中...<br><small>请确保网络连接正常</small></p>';
            }
        }

        function openQRModal() {
            document.getElementById('qrModal').style.display = 'flex';
            updateQRCode();
        }

        function closeQRModal(event) {
            if (event && event.target !== document.getElementById('qrModal')) return;
            document.getElementById('qrModal').style.display = 'none';
        }
        document.getElementById('qrModal').addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });

        // ==================== SETTINGS ====================
        function openSettings() {
            document.getElementById('gasUrlInput').value = APP_STATE.gasUrl;
            document.getElementById('settingsModal').style.display = 'flex';
        }

        function closeSettingsModal(event) {
            if (event && event.target !== document.getElementById('settingsModal')) return;
            document.getElementById('settingsModal').style.display = 'none';
        }
        document.getElementById('settingsModal').addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });

        function saveSettings() {
            const url = document.getElementById('gasUrlInput').value.trim();
            APP_STATE.gasUrl = url;
            localStorage.setItem('gasUrl', url);
            document.getElementById('settingsModal').style.display = 'none';
            if (url) {
                fetchFromGoogleSheets().then(() => showToast('✅ 设置已保存并同步'))
                    .catch(() => showToast('⚠️ URL已保存但连接失败'));
            } else {
                loadDemoData();
                renderAll();
                showToast('✅ 已切换到本地演示模式');
            }
        }

        // ==================== TOAST ====================
        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        // ==================== URL PARAM CHECK ====================
        function checkUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const mode = params.get('mode');
            if (mode === 'customer') {
                switchMode('customer');
            }
        }

        // ==================== KEYBOARD SHORTCUTS ====================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F1') {
                e.preventDefault();
                switchMode('cashier');
            }
            if (e.key === 'F2') {
                e.preventDefault();
                switchMode('customer');
            }
            if (e.key === 'F8' && APP_STATE.mode === 'cashier') {
                e.preventDefault();
                quickPayment('cash');
            }
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
            }
        });

        // ==================== START ====================
        init();
        checkUrlParams();

        console.log('🍅 柿柿润糖水 POS 系统已就绪');
        console.log('  💰 收银模式 - 当前视图');
        console.log('  📱 顾客模式 - 扫码或切换');
        console.log('  ⚙️ 设置 Google Sheets URL 以启用云同步');
        console.log('  📋 F1=收银 F2=顾客 F8=现金结算 Esc=关闭弹窗');
        console.log('  📞 017-8369622 / +6010-8476666');
    </script>
</body>
</html>
